# EnvGuard default configuration
# Override any of these by placing a .envguard.properties file in your project root.

# Path to the patterns file containing regex patterns for secret detection
envguard.patterns.file=config/patterns.txt

# Whether to exit with a non-zero code (blocking the commit) when violations are found
envguard.fail.on.violation=true

# Maximum file size (in KB) to scan; files larger than this are skipped
envguard.max.file.size.kb=512

# Comma-separated list of path prefixes/directories to exclude from scanning
envguard.excluded.paths=.git,target,node_modules,.idea,build

# Report output format: text | json
envguard.report.format=text
